server {
    listen 80;
    server_name auditel.omar-xyz.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auditel.omar-xyz.shop;

    ssl_certificate     /etc/letsencrypt/live/auditel.omar-xyz.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auditel.omar-xyz.shop/privkey.pem;

    access_log /var/log/nginx/portfolio-auditel-access.log;
    error_log  /var/log/nginx/portfolio-auditel-error.log;

    client_max_body_size 16M;

    location / {
        proxy_pass         http://127.0.0.1:5003;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
